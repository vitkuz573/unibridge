openapi: 3.1.0
info:
  title: unibridge
  description: Universal OpenAI-compatible proxy for any LLM backend
  version: 2.0.0
  contact:
    name: vitkuz573
    url: https://github.com/vitkuz573/unibridge
servers:
  - url: http://127.0.0.1:5200
    description: Local proxy
paths:
  /v1/models:
    get:
      summary: List all models from all backends
      operationId: listModels
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Model'
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Proxy status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  backends:
                    type: array
                    items: { type: string }
                  total_models: { type: integer }
  /v1/chat/completions:
    post:
      summary: Chat Completions API
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/responses:
    post:
      summary: Responses API (OpenAI Codex CLI compatible)
      operationId: createResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsesRequest'
      responses:
        '200':
          description: Response object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesResponse'
  /v1/completions:
    post:
      summary: Legacy Completions API
      operationId: createCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacyCompletionRequest'
      responses:
        '200':
          description: Legacy completion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyCompletionResponse'
  /v1/embeddings:
    post:
      summary: Embeddings (stub)
      operationId: createEmbedding
      responses:
        '501':
          description: Not implemented
components:
  schemas:
    Model:
      type: object
      properties:
        id: { type: string, example: opencode/big-pickle }
        object: { type: string, enum: [model] }
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model: { type: string, example: big-pickle }
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        stream: { type: boolean, default: false }
        max_tokens: { type: integer }
        max_completion_tokens: { type: integer }
        temperature: { type: number }
        response_format:
          type: object
          properties:
            type: { type: string, enum: [json_object, text] }
    Message:
      type: object
      required: [role, content]
      properties:
        role: { type: string, enum: [system, user, assistant] }
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ContentPart'
    ContentPart:
      type: object
      properties:
        type: { type: string, enum: [text, image_url] }
        text: { type: string }
        image_url:
          type: object
          properties:
            url: { type: string }
    ChatCompletionResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string }
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              message:
                type: object
                properties:
                  role: { type: string }
                  content: { type: string }
              finish_reason: { type: string }
        usage:
          $ref: '#/components/schemas/Usage'
    Usage:
      type: object
      properties:
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }
    ResponsesRequest:
      type: object
      required: [model, input]
      properties:
        model: { type: string }
        input:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ResponseInputItem'
        stream: { type: boolean, default: false }
        max_output_tokens: { type: integer }
        temperature: { type: number }
    ResponseInputItem:
      type: object
      properties:
        type: { type: string, enum: [message, input_text, input_image] }
        role: { type: string }
        content:
          oneOf:
            - type: string
            - type: array
              items: { type: object }
    ResponsesResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string }
        created: { type: integer }
        model: { type: string }
        output:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              type: { type: string }
              role: { type: string }
              content:
                type: array
                items:
                  type: object
                  properties:
                    type: { type: string, enum: [output_text] }
                    text: { type: string }
        usage:
          $ref: '#/components/schemas/ResponsesUsage'
    ResponsesUsage:
      type: object
      properties:
        input_tokens: { type: integer }
        output_tokens: { type: integer }
        total_tokens: { type: integer }
    LegacyCompletionRequest:
      type: object
      required: [model, prompt]
      properties:
        model: { type: string }
        prompt:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        stream: { type: boolean }
        max_tokens: { type: integer }
        temperature: { type: number }
    LegacyCompletionResponse:
      type: object
      properties:
        id: { type: string }
        object: { type: string }
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            properties:
              text: { type: string }
              index: { type: integer }
              finish_reason: { type: string }
        usage:
          $ref: '#/components/schemas/Usage'
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message: { type: string }
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
